key: ib-liquid-callout
name: $string.ibcallout_name
category: $string.ibcallout_category
icon: fa fa-lightbulb-o
engine: liquid
template: |
  <div class="alert alert-{{ type }} d-flex align-items-center" data-widget="ib-liquid-callout" role="alert">
    <div class="twh-callout-icon mr-3 me-3">
      {%- if type == 'primary' -%}<i class="fa fa-book fa-2x"></i>
      {%- elsif type == 'info' -%}<i class="fa fa-pencil fa-2x"></i>
      {%- elsif type == 'success' -%}<i class="fa fa-lightbulb-o fa-2x"></i>
      {%- elsif type == 'warning' -%}<i class="fa fa-exclamation-triangle fa-2x"></i>
      {%- elsif type == 'danger' -%}<i class="fa fa-anchor fa-2x"></i>
      {%- endif -%}
    </div>
    <div class="twh-callout-content">
      <h5 class="twh-callout-title mt-0 mb-1">{{ title }}</h5>
      <div class="twh-iq">
        {% if content != "" %}
          {{ content }}
        {% else %}
          <p>__LOREM__</p>
        {% endif %}
      </div>
    </div>
  </div>
  <p><br></p>
selectors: div[data-widget="ib-liquid-callout"]
insertquery: div.twh-callout-content > div.twh-iq
unwrap: div.twh-iq > *
parameters:
  - name: type
    title: $string.ibcallout_type
    value: primary
    options:
      - {l: "📘 $string.ibcallout_definition", v: primary}
      - {l: "📐 $string.ibcallout_theorem", v: info}
      - {l: "💡 $string.ibcallout_example", v: success}
      - {l: "⚠️ $string.ibcallout_warning", v: warning}
      - {l: "📌 $string.ibcallout_remember", v: danger}
    bind: classRegex('alert-(.*)')
  - name: title
    title: $string.ibcallout_title
    value: Definition
    bind: text('.twh-callout-title')
  - name: content
    title: $string.ibcallout_content
    type: textarea
    value: ""
    when: "SELECT_MODE == 'insert'"
author: Josep Mulet <pep.mulet@gmail.com>
version: 1.0.0
